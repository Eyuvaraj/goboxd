<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1E2761"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="560" fill="#FFFFFF"/>
  <text x="380" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E2761">Concurrency Model — Counting Semaphore</text>

  <!-- Incoming requests -->
  <text x="120" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">Incoming Requests</text>
  <circle cx="60" cy="110" r="16" fill="#CADCFC" stroke="#1E2761"/>
  <circle cx="100" cy="110" r="16" fill="#CADCFC" stroke="#1E2761"/>
  <circle cx="140" cy="110" r="16" fill="#CADCFC" stroke="#1E2761"/>
  <circle cx="180" cy="110" r="16" fill="#CADCFC" stroke="#1E2761"/>
  <circle cx="220" cy="110" r="16" fill="#CADCFC" stroke="#1E2761"/>
  <text x="60" y="115" text-anchor="middle" font-size="11" fill="#1E2761">R1</text>
  <text x="100" y="115" text-anchor="middle" font-size="11" fill="#1E2761">R2</text>
  <text x="140" y="115" text-anchor="middle" font-size="11" fill="#1E2761">R3</text>
  <text x="180" y="115" text-anchor="middle" font-size="11" fill="#1E2761">R4</text>
  <text x="220" y="115" text-anchor="middle" font-size="11" fill="#1E2761">R5</text>
  <line x1="140" y1="130" x2="140" y2="160" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- FIFO Queue box -->
  <rect x="40" y="165" width="280" height="70" rx="8" fill="#FFFFFF" stroke="#1E2761" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="180" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">FIFO Queue (waiting for slot)</text>
  <text x="180" y="210" text-anchor="middle" font-size="11" fill="#1E2761">If MAX_QUEUE_DEPTH reached → 503 + Retry-After</text>
  <text x="180" y="225" text-anchor="middle" font-size="10" fill="#666666">(disabled when MAX_QUEUE_DEPTH = 0, default)</text>

  <line x1="180" y1="235" x2="180" y2="265" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Semaphore -->
  <rect x="40" y="270" width="280" height="160" rx="8" fill="#1E2761"/>
  <text x="180" y="296" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Semaphore</text>
  <text x="180" y="314" text-anchor="middle" font-size="11" fill="#CADCFC">chan struct{} of size MAX_CONCURRENT_JOBS</text>
  <text x="180" y="330" text-anchor="middle" font-size="11" fill="#CADCFC">default = config.AvailableCPUs() (cgroup-aware)</text>

  <!-- tokens -->
  <rect x="60" y="345" width="40" height="30" rx="4" fill="#5A78F0"/>
  <rect x="110" y="345" width="40" height="30" rx="4" fill="#5A78F0"/>
  <rect x="160" y="345" width="40" height="30" rx="4" fill="#CADCFC" stroke="#5A78F0"/>
  <rect x="210" y="345" width="40" height="30" rx="4" fill="#CADCFC" stroke="#5A78F0"/>
  <rect x="260" y="345" width="40" height="30" rx="4" fill="#CADCFC" stroke="#5A78F0"/>
  <text x="180" y="385" text-anchor="middle" font-size="11" fill="#FFFFFF">filled = in-flight job · empty = free token</text>
  <text x="180" y="405" text-anchor="middle" font-size="11" fill="#FFFFFF">acquire on entry, release (defer) on completion</text>

  <line x1="320" y1="350" x2="380" y2="350" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Worker boxes -->
  <rect x="390" y="270" width="320" height="50" rx="6" fill="#CADCFC"/>
  <text x="550" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">Job 1 — nsjail sandbox execution</text>

  <rect x="390" y="330" width="320" height="50" rx="6" fill="#CADCFC"/>
  <text x="550" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">Job 2 — nsjail sandbox execution</text>

  <text x="550" y="412" text-anchor="middle" font-size="12" font-style="italic" fill="#666666">... up to MAX_CONCURRENT_JOBS running concurrently ...</text>

  <!-- Bottom: timeout box -->
  <rect x="40" y="450" width="680" height="90" rx="8" fill="#FFFFFF" stroke="#1E2761" stroke-width="1.5"/>
  <text x="380" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">Timeouts Bound the Worst Case</text>
  <text x="380" y="497" text-anchor="middle" font-size="11" fill="#1E2761">Per-test wall-time limit (language config) · WriteTimeout (server) · ReadHeaderTimeout = 5s</text>
  <text x="380" y="516" text-anchor="middle" font-size="11" fill="#1E2761">Graceful shutdown drains in-flight jobs · per-job process WaitDelay = 5s (force-kill stragglers)</text>
</svg>
