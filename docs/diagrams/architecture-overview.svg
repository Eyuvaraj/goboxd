<svg viewBox="0 0 760 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1E2761"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="1000" fill="#FFFFFF"/>
  <text x="380" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E2761">goboxd — High-Level Architecture</text>

  <!-- Box template: x=40, width=680 -->
  <!-- 1 -->
  <rect x="40" y="60" width="680" height="60" rx="8" fill="#1E2761"/>
  <text x="380" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">HTTP Client — POST /run, /v1/run, GET /healthz /readyz /info</text>
  <line x1="380" y1="120" x2="380" y2="148" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2 -->
  <rect x="40" y="150" width="680" height="60" rx="8" fill="#CADCFC" stroke="#1E2761" stroke-width="1.5"/>
  <text x="380" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E2761">chi Router + Middleware</text>
  <text x="380" y="198" text-anchor="middle" font-size="12" fill="#1E2761">logging · panic recovery · request body size limits</text>
  <line x1="380" y1="210" x2="380" y2="238" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3 -->
  <rect x="40" y="240" width="680" height="60" rx="8" fill="#CADCFC" stroke="#1E2761" stroke-width="1.5"/>
  <text x="380" y="268" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E2761">Validation  (internal/validate)</text>
  <text x="380" y="288" text-anchor="middle" font-size="12" fill="#1E2761">language, filenames, sizes, flags, limits, test count → 400 on failure</text>
  <line x1="380" y1="300" x2="380" y2="328" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4 -->
  <rect x="40" y="330" width="680" height="60" rx="8" fill="#CADCFC" stroke="#1E2761" stroke-width="1.5"/>
  <text x="380" y="358" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E2761">Concurrency Gate  (internal/runner)</text>
  <text x="380" y="378" text-anchor="middle" font-size="12" fill="#1E2761">counting semaphore (MAX_CONCURRENT_JOBS) · FIFO queue · optional 503 load shedding</text>
  <line x1="380" y1="390" x2="380" y2="418" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5 -->
  <rect x="40" y="420" width="680" height="60" rx="8" fill="#CADCFC" stroke="#1E2761" stroke-width="1.5"/>
  <text x="380" y="448" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E2761">Workspace Lifecycle</text>
  <text x="380" y="468" text-anchor="middle" font-size="12" fill="#1E2761">os.MkdirTemp (0700) → write source → run phases → defer Cleanup</text>
  <line x1="380" y1="480" x2="380" y2="508" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6: Sandbox execution - bigger box with inner detail -->
  <rect x="40" y="510" width="680" height="220" rx="8" fill="#FFFFFF" stroke="#1E2761" stroke-width="2"/>
  <text x="380" y="535" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E2761">Sandbox Execution  (internal/sandbox — nsjail)</text>

  <rect x="60" y="550" width="320" height="65" rx="6" fill="#CADCFC"/>
  <text x="220" y="572" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">Build Phase</text>
  <text x="220" y="590" text-anchor="middle" font-size="11" fill="#1E2761">(compiled languages only)</text>
  <text x="220" y="606" text-anchor="middle" font-size="11" fill="#1E2761">compiler runs inside nsjail</text>

  <rect x="400" y="550" width="320" height="65" rx="6" fill="#CADCFC"/>
  <text x="560" y="572" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E2761">Run Phase (per test)</text>
  <text x="560" y="590" text-anchor="middle" font-size="11" fill="#1E2761">fresh nsjail sandbox per test</text>
  <text x="560" y="606" text-anchor="middle" font-size="11" fill="#1E2761">stdin piped in, stdout/stderr captured</text>

  <text x="380" y="640" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E2761">Enforced inside every nsjail invocation:</text>
  <text x="380" y="660" text-anchor="middle" font-size="11" fill="#1E2761">Linux namespaces (pid/net/mount/uts/ipc/cgroup) · chroot to per-job workspace</text>
  <text x="380" y="678" text-anchor="middle" font-size="11" fill="#1E2761">cgroup v2 limits (memory.max, pids.max) · rlimits (CPU, AS, FSIZE, NPROC, STACK)</text>
  <text x="380" y="696" text-anchor="middle" font-size="11" fill="#1E2761">seccomp-BPF (Kafel deny-list) · no network (--iface_no_lo)</text>
  <line x1="380" y1="730" x2="380" y2="758" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7 -->
  <rect x="40" y="760" width="680" height="60" rx="8" fill="#CADCFC" stroke="#1E2761" stroke-width="1.5"/>
  <text x="380" y="788" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E2761">Status Parsing</text>
  <text x="380" y="808" text-anchor="middle" font-size="12" fill="#1E2761">exit code + signal + nsjail logs + cgroup memory.peak/memory.events → status vocabulary</text>
  <line x1="380" y1="820" x2="380" y2="848" stroke="#1E2761" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8 -->
  <rect x="40" y="850" width="680" height="70" rx="8" fill="#1E2761"/>
  <text x="380" y="880" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">JSON Response — HTTP 200</text>
  <text x="380" y="902" text-anchor="middle" font-size="12" fill="#FFFFFF">{ status, build: {...}, tests: [ {status, stdout, stderr, duration_ms, memory_peak_kb} ] }</text>

  <text x="380" y="970" text-anchor="middle" font-size="11" fill="#666666">Concurrency slot is released and the workspace is removed once the response is sent.</text>
</svg>
