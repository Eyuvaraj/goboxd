  #   run:
  #     cmd: /solution
  #     args: []
  #     limits:
  #       wall_time_s: 5
  #       memory_kb: 262144
  #       max_processes: 64

  - id: csharp
    name: C#
    source_filename: solution.cs
    artifact_filename: solution.exe
    build:
      cmd: /usr/bin/mcs
      args: ["-out:{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 15
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-optimize+"
        - "-debug"
        - "-unsafe"
    run:
      cmd: /usr/bin/mono
      args: ["{{artifact}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 100

  - id: zig
    name: Zig
    source_filename: solution.zig
    artifact_filename: solution
    probe_args: ["version"]
    build:
      cmd: /usr/local/bin/zig
      args: ["build-exe", "{{source}}", "-femit-bin={{artifact}}"]
      limits:
        wall_time_s: 45
        memory_kb: 524288
        max_processes: 100
      flag_allowlist: []
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 262144
        max_processes: 64

  - id: go
    name: Go
    source_filename: solution.go
    artifact_filename: solution
    probe_args: ["version"]
    env:
      - GO111MODULE=off
      - CGO_ENABLED=0
      - GOPATH=/
      - GOCACHE=/.cache/go-build
    build:
      cmd: /usr/local/go/bin/go
      args: ["build", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 40
        memory_kb: 524288
        max_processes: 100
      flag_allowlist: []
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 262144
        max_processes: 64

  - id: prolog
    name: Prolog
    source_filename: solution.pl
    run:
      cmd: /usr/bin/swipl
      args: ["-q", "-t", "main", "-s", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 131072
        max_processes: 50

  - id: assembly
    name: Assembly (x86)
    source_filename: solution.asm
    artifact_filename: solution
    build:
      cmd: /usr/local/bin/nasm-build
      args: ["{{source}}", "{{artifact}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 50
      flag_allowlist: []
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 131072
        max_processes: 64
