languages:
  - id: py3
    name: Python 3
    source_filename: solution.py
    run:
      cmd: /usr/bin/python3
      args: ["{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 102400
        max_processes: 100

  - id: bash
    name: Bash
    source_filename: solution.sh
    run:
      cmd: /bin/bash
      args: ["{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 102400
        max_processes: 50

  - id: js
    name: JavaScript (Node)
    source_filename: solution.js
    run:
      cmd: /usr/bin/node
      args: ["{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 100

  - id: c
    name: C
    source_filename: solution.c
    artifact_filename: solution
    build:
      cmd: /usr/bin/gcc
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-O0"
        - "-O1"
        - "-O2"
        - "-O3"
        - "-Wall"
        - "-Wextra"
        - "-std=*"
        - "-lm"
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 262144
        max_processes: 64

  - id: csharp
    name: C#
    source_filename: solution.cs
    artifact_filename: solution.exe
    build:
      cmd: /usr/bin/mcs
      args: ["{{flags}}", "-out:{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 20
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-optimize+"
        - "-langversion:*"
        - "-unsafe"
    run:
      cmd: /usr/bin/mono
      args: ["{{artifact}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100

  - id: asm
    name: Assembly x86 (NASM, 32-bit)
    source_filename: solution.asm
    artifact_filename: solution
    # nasm-build (installed by scripts/lang_install/asm.sh) assembles (nasm -f elf32)
    # and links (ld -m elf_i386) in one step, and answers --version for the readiness
    # probe. Targets x86-64 Linux hosts; the 32-bit binary runs natively.
    build:
      cmd: /usr/local/bin/nasm-build
      args: ["{{source}}", "{{artifact}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 100
      flag_allowlist: []
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 131072
        max_processes: 64

  - id: prolog
    name: Prolog (SWI)
    source_filename: solution.pl
    run:
      cmd: /usr/bin/swipl
      args: ["-q", "-g", "halt", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 100

  - id: cpp
    name: C++
    source_filename: solution.cpp
    artifact_filename: solution
    build:
      cmd: /usr/bin/g++
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-O0"
        - "-O1"
        - "-O2"
        - "-O3"
        - "-Wall"
        - "-Wextra"
        - "-std=*"
        - "-Wno-*"
        - "-lm"
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 262144
        max_processes: 64

  - id: java
    name: Java
    source_filename_strategy: from_request
    artifact_filename_strategy: from_request
    build:
      cmd: /usr/bin/javac
      args: ["{{flags}}", "{{source}}"]
      limits:
        wall_time_s: 15
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-encoding"
        - "UTF-8"
        - "-source"
        - "-target"
    run:
      cmd: /usr/bin/java
      args: ["{{artifact}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100

  - id: verilog
    name: Verilog
    source_filename: solution.v
    artifact_filename: solution.vvp
    probe_args: ["-V"]
    build:
      cmd: /usr/bin/iverilog
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 100
      flag_allowlist:
        - "-g2012"
        - "-Wall"
    run:
      cmd: /usr/bin/vvp
      args: ["{{artifact}}"]
      limits:
        wall_time_s: 5
        memory_kb: 131072
        max_processes: 64

  - id: ruby
    name: Ruby
    source_filename: solution.rb
    run:
      cmd: /usr/bin/ruby
      args: ["{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 131072
        max_processes: 100

  - id: lua
    name: Lua
    source_filename: solution.lua
    probe_args: ["-v"]
    run:
      cmd: /usr/bin/lua5.4
      args: ["{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 65536
        max_processes: 50

  - id: ocaml
    name: OCaml
    source_filename: solution.ml
    run:
      cmd: /usr/bin/ocaml
      args: ["{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 131072
        max_processes: 100

