  #   name: Swift
  #   source_filename: solution.swift
  #   artifact_filename: solution
  #   build:
  #     cmd: /usr/local/swift/usr/bin/swiftc
  #     args: ["{{flags}}", "-static-stdlib", "-o", "{{artifact}}", "{{source}}"]
  #     limits:
  #       wall_time_s: 60
