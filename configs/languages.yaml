languages:
  - id: py3
    name: Python 3
    source_filename: solution.py
    run:
      cmd: /usr/bin/python3
      args: ["{{source}}"]
      limits:
        wall_time_s: 9
        memory_kb: 102400
        max_processes: 100

  - id: bash
    name: Bash
    source_filename: solution.sh
    run:
      cmd: /bin/bash
      args: ["{{source}}"]
      limits:
        wall_time_s: 9
        memory_kb: 102400
        max_processes: 50

  - id: js
    name: JavaScript (Node)
    source_filename: solution.js
    run:
      cmd: /usr/bin/node
      args: ["{{source}}"]
      limits:
        wall_time_s: 9
        memory_kb: 262144
        max_processes: 100

  - id: c
    name: C
    source_filename: solution.c
    artifact_filename: solution
    build:
      cmd: /usr/bin/gcc
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-O0"
        - "-O1"
        - "-O2"
        - "-O3"
        - "-Wall"
        - "-Wextra"
        - "-std=*"
        - "-lm"
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 262144
        max_processes: 64

  - id: cpp
    name: C++
    source_filename: solution.cpp
    artifact_filename: solution
    build:
      cmd: /usr/bin/g++
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-O0"
        - "-O1"
        - "-O2"
        - "-O3"
        - "-Wall"
        - "-Wextra"
        - "-std=*"
        - "-Wno-*"
        - "-lm"
    run:
      cmd: /solution
      args: []
      limits:
        wall_time_s: 5
        memory_kb: 262144
        max_processes: 64

  - id: java
    name: Java
    source_filename_strategy: from_request
    artifact_filename_strategy: from_request
    build:
      cmd: /usr/bin/javac
      args: ["{{flags}}", "{{source}}"]
      limits:
        wall_time_s: 15
        memory_kb: 524288
        max_processes: 100
      flag_allowlist:
        - "-encoding"
        - "UTF-8"
        - "-source"
        - "-target"
    run:
      cmd: /usr/bin/java
      args: ["{{artifact}}"]
      limits:
        wall_time_s: 10
        memory_kb: 524288
        max_processes: 100

  - id: verilog
    name: Verilog
    source_filename: solution.v
    artifact_filename: solution.vvp
    build:
      cmd: /usr/bin/iverilog
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits:
        wall_time_s: 10
        memory_kb: 262144
        max_processes: 100
      flag_allowlist:
        - "-g2012"
        - "-Wall"
    run:
      cmd: /usr/bin/vvp
      args: ["{{artifact}}"]
      limits:
        wall_time_s: 5
        memory_kb: 131072
        max_processes: 64
