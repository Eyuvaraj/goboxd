name: CI

on:
  push:
    branches: [ master, "team/**" ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache tools image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          tags: goboxd-tools:dev
          load: true
          cache-from: type=gha,scope=tools
          cache-to: type=gha,scope=tools,mode=max

      - name: Build and cache runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          tags: goboxd:dev
          load: true
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,scope=runtime,mode=max

      - name: Lint
        run: make lint

      - name: Unit Tests
        run: make test

      - name: Build Server
        run: make build

      - name: Integration Tests
        run: make integration
