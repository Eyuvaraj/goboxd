name: Benchmarks

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install hey
        run: go install github.com/rakyll/hey@latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          tags: goboxd:dev
          load: true

      - name: Start server
        run: docker compose up -d goboxd

      - name: Wait for readiness
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && echo " ready" && break
            echo "waiting... ($i)"
            sleep 2
          done

      - name: Runner diagnostics
        run: |
          echo "=== Host CPU ==="
          nproc || true
          lscpu || true

          echo
          echo "=== Host Memory ==="
          free -h || true

          echo
          echo "=== Host Cgroup Limits ==="
          cat /sys/fs/cgroup/cpu.max || true
          cat /sys/fs/cgroup/memory.max || true

      - name: Container diagnostics
        run: |
          echo "=== Container CPU Count ==="
          docker compose exec -T goboxd nproc || true

          echo
          echo "=== Container CPU Quota ==="
          docker compose exec -T goboxd sh -c 'cat /sys/fs/cgroup/cpu.max || true'

          echo
          echo "=== Container Memory Limit ==="
          docker compose exec -T goboxd sh -c 'cat /sys/fs/cgroup/memory.max || true'

          echo
          echo "=== Environment ==="
          docker compose exec -T goboxd sh -c 'env | sort | grep -E "MAX_|GOMAXPROCS" || true'

      - name: Run load test
        run: make load
