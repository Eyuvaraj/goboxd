services:
  goboxd:
    # Pinned to x86-64: the asm language builds/runs 32-bit x86 (nasm -f elf32,
    # ld -m elf_i386), which needs an amd64 image. On Apple Silicon this builds and
    # runs under emulation; on amd64 Linux hosts it is native.
    platform: linux/amd64
    build:
      context: .
      target: runtime
    image: goboxd:dev
    container_name: goboxd
    ports:
      - "8080:8080"
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
      # Docker masks paths inside /proc (e.g. /dev/null over /proc/kcore) by
      # default on every host OS. nsjail mounts a fresh procfs inside its mount
      # namespace, which the kernel refuses while those overmounts exist
      # ("Couldn't mount '/proc'"). Unconfining the system paths removes the
      # masks so nsjail can mount /proc. Without this, every /run fails.
      - systempaths=unconfined
    # Docker mounts /sys/fs/cgroup read-only by default (all host OSes). nsjail
    # needs to create child cgroups under it to enforce memory.max / pids.max and
    # read memory.peak, so mount it read-write. Combined with cgroup: host below
    # this gives nsjail the root cgroup-v2 hierarchy it requires (it errors with
    # "run the container with --cgroupns=host" otherwise).
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroup: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  tools:
    # Match goboxd's arch so the shared builder stage isn't rebuilt per-arch.
    platform: linux/amd64
    build:
      context: .
      target: builder
    image: goboxd-tools:dev
    volumes:
      - .:/src
    working_dir: /src
    profiles: ["tools"]
    entrypoint: []
    environment:
      - GOBOXD_URL=http://goboxd:8080
    depends_on:
      goboxd:
        condition: service_healthy
