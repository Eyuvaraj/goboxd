services:
  goboxd:
    build:
      context: .
      target: runtime
    image: goboxd:dev
    container_name: goboxd
    restart: unless-stopped
    ports:
      - "8080:8080"
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
      # Docker masks paths inside /proc (e.g. /dev/null over /proc/kcore) by
      # default on every host OS. nsjail mounts a fresh procfs inside its mount
      # namespace, which the kernel refuses while those overmounts exist
      # ("Couldn't mount '/proc'"). Unconfining the system paths removes the
      # masks so nsjail can mount /proc. Without this, every /run fails.
      - systempaths=unconfined
      # Ubuntu's docker-default AppArmor profile blocks pivot_root, mount, and
      # some namespace operations that nsjail uses during chroot setup.
      # Without this, all executions fail: compiled → build.internal_error,
      # interpreted → runtime_error (nsjail exits before the child starts).
      - apparmor:unconfined
    # Docker mounts /sys/fs/cgroup read-only by default (all host OSes). nsjail
    # needs to create child cgroups under it to enforce memory.max / pids.max and
    # read memory.peak, so mount it read-write. Combined with cgroup: host below
    # this gives nsjail the root cgroup-v2 hierarchy it requires (it errors with
    # "run the container with --cgroupns=host" otherwise).
    environment:
      - NSJAIL_VERSION=3.4
      # Tune these for the host VM. Defaults: MAX_CONCURRENT_JOBS=nCPU,
      # MAX_QUEUE_DEPTH=0 (unbounded). On a 2-core VM set JOBS=2, QUEUE=50.
      # - MAX_CONCURRENT_JOBS=4
      # - MAX_QUEUE_DEPTH=100
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./configs/languages.yaml:/etc/goboxd/languages.yaml:ro
    cgroup: host
    # Container-level backstop: if nsjail containment fails (kernel bug, config
    # error) this caps the blast radius. Set to ~2x the highest per-job limit.
    deploy:
      resources:
        limits:
          memory: 8g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  tools:
    build:
      context: .
      target: builder
    image: goboxd-tools:dev
    volumes:
      - .:/src
    working_dir: /src
    profiles: ["tools"]
    entrypoint: []
    environment:
      - GOBOXD_URL=http://goboxd:8080
    depends_on:
      goboxd:
        condition: service_healthy
