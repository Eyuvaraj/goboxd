version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - misspell
    - gosec
  settings:
    errcheck:
      check-type-assertions: false
    gosec:
      excludes:
        - G204 # exec with variable argv — all call sites use pre-validated args
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
