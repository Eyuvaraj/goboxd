version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - misspell
  settings:
    errcheck:
      check-type-assertions: false
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
